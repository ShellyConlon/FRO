<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRO | Luxury Menswear</title>
    <style>
        /* Basic reset and typography */
        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Navigation styling */
        nav {
            padding: 30px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Main content layout */
        main {
            padding: 80px 20px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .product-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            display: block;
            margin: 0 auto 30px auto;
        }

        /* Footer styling */
        footer {
            margin-top: 100px;
            padding: 60px 20px;
            background-color: #fcfcfc;
            border-top: 1px solid #f0f0f0;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">New Arrivals</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">About FRO</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>THE TAILORED SUIT</h1>

        <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0?auto=format&fit=crop&q=80&w=800"
            alt="High-end mens tailored suit" class="product-image">

        <p>Experience the precision of modern tailoring and Italian craftsmanship.</p>
    </main>

    <footer>
        <p>&copy; 2026 FRO MENS FASHION BRAND. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
